{% extends "layout.html" %}
{% block title %} Products {% endblock %}

{% block content %}

<div class="top-card">

    <h2>🎤 Voice Shopping</h2>

    <a href="/cart">Cart</a> |
    <a href="/logout">Logout</a>

    <br><br>

    <form id="searchForm" method="GET" action="/products">
        <input type="text" name="q" id="searchInput" placeholder="Search product">
    </form>

    <button onclick="startListening()">🎤 Speak</button>

</div>


<!-- 🔥 PRODUCTS OUTSIDE CARD -->
<div class="product-grid">

    {% if products %}
    {% for product in products %}
    <div class="product-card">
        <h3>{{ product.name }}</h3>
        <p class="price">₹{{ product.price }}</p>
        <a href="/add/{{ product.id }}">
            <button>Add to Cart</button>
        </a>
    </div>
    {% endfor %}
    {% else %}
    <h3 class="empty-text">🎤 Say a product like "shoes"</h3>
    {% endif %}

</div>

<script>

// 🔊 TEXT TO SPEECH (WITH RESET)
function speak(text){
    window.speechSynthesis.cancel();   // 🔥 STOP previous speech
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    window.speechSynthesis.speak(speech);
}

// 🎤 VOICE INPUT
function startListening(){

    if (!('webkitSpeechRecognition' in window)){
        alert("Use Google Chrome");
        return;
    }

    const recognition = new webkitSpeechRecognition();

    recognition.lang = "en-IN";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = function(){
        console.log("Listening...");
    };

    recognition.onresult = function(event){

        let voiceText = event.results[0][0].transcript.toLowerCase().trim();

        console.log("User said:", voiceText);

        let cleanText = voiceText
            .replace("search", "")
            .replace("show", "")
            .replace("i want", "")
            .replace("buy", "")
            .replace("please", "")
            .trim();

        if(cleanText === ""){
            speak("Please say a product name");
            return;
        }

        // 🎯 COMMANDS
        if(cleanText.includes("cart")){
                speak("Opening cart");
                window.location.href = "/cart";
        }

        else if(cleanText.includes("logout")){
                speak("Logging out");
                window.location.href = "/logout";
        }

            // ✅ ADD HERE
        else if(cleanText.includes("remove")){

                let productName = cleanText.replace("remove", "").trim();

                if(productName === ""){
                    speak("Please say which product to remove");
                    return;
                }

                speak("Removing " + productName + " from cart");

                window.location.href = "/voice-remove?q=" + encodeURIComponent(productName);
        }

            // EXISTING ADD
        else if(cleanText.includes("add")){

                let productName = cleanText.replace("add", "").trim();

                if(productName === ""){
                    speak("Please say which product to add");
                    return;
                }

                speak("Adding " + productName + " to cart");

                window.location.href = "/voice-add?q=" + encodeURIComponent(productName);
        }

            // SEARCH
        else{
                speak("Searching for " + cleanText);

                document.getElementById("searchInput").value = cleanText;
                document.getElementById("searchForm").submit();
        }
    };

    recognition.onerror = function(event){
        console.log("Error:", event.error);
        speak("Sorry, try again");
    };

    recognition.onend = function(){
        console.log("Stopped listening");
    };

    recognition.start();
}

// 🚀 ONE-TIME VOICE INTRO
window.onload = function(){

    if(!sessionStorage.getItem("voiceIntroDone")){

        sessionStorage.setItem("voiceIntroDone", "true");

        setTimeout(() => {
            speak("Click the mic and say a product name");
        }, 500);
    }
};

</script>
{% endblock %}
